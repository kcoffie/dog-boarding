name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  VITE_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
  VITE_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
  VITE_ENVIRONMENT: test

jobs:
  # Job 1: Lint
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  # Job 2: Requirements coverage
  requirements:
    name: Requirements Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Check requirements coverage
        run: npm run check:requirements

  # Job 3: Unit tests with coverage
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run tests with coverage
        run: npm run test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 4: Build check
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, requirements]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
          retention-days: 7

  # Job 5: Doc staleness check (PR only — warning only, never fails the build)
  doc-staleness:
    name: Doc Staleness
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Warn if job source changed without doc update
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          CODE_CHANGED=$(echo "$CHANGED" | grep -E '^(api/[^/]+\.js|src/lib/scraper/[^/]+\.js)$' || true)
          DOCS_CHANGED=$(echo "$CHANGED" | grep -E '^docs/job_docs/' || true)

          if [ -n "$CODE_CHANGED" ] && [ -z "$DOCS_CHANGED" ]; then
            echo "::warning::Job source files changed but docs/job_docs/ was not updated. Consider updating the relevant docs/job_docs/ file."
            echo ""
            echo "Changed source files:"
            echo "$CODE_CHANGED"
          else
            echo "✅ No doc staleness detected."
          fi
